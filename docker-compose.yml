version: '3.8'

services:
  lumas-portfolio:
    build: .
    container_name: lumas-portfolio
    restart: always
    env_file: .env
    volumes:
      - ./prisma:/app/prisma
      - ./uploads:/app/uploads
    # No external network needed because Traefik is in 'host' mode on your VPS
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lumas.entrypoints=websecure"
      - "traefik.http.routers.lumas.rule=Host(`lumascreative.com`) || Host(`www.lumascreative.com`)"
      - "traefik.http.routers.lumas.tls.certresolver=letsencrypt"
      - "traefik.http.services.lumas.loadbalancer.server.port=3001"
